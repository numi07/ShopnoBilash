<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্বপ্নবিলাস | ফ্ল্যাট ম্যানেজমেন্ট সিস্টেম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background: #f1f5f9; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); }
        .nav-btn { transition: 0.3s; color: #94a3b8; cursor: pointer; border-left: 4px solid transparent; }
        .nav-btn:hover, .nav-btn.active { background: #334155; color: #fff; border-left: 4px solid #3b82f6; }
        .hidden { display: none !important; }
        .invoice-box { background: white; padding: 30px; border: 1px solid #eee; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="flex min-h-screen">

<div id="authOverlay" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center p-6">
    <div id="choiceBox" class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md text-center">
        <h2 class="text-3xl font-bold mb-8 text-slate-800">স্বপ্নবিলাস</h2>
        <div class="space-y-4">
            <button onclick="showLogin('admin')" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700">অ্যাডমিন লগইন</button>
            <button onclick="showLogin('user')" class="w-full bg-slate-100 text-slate-700 py-4 rounded-xl font-bold hover:bg-slate-200">ভাড়াটিয়া লগইন</button>
        </div>
    </div>
    <div id="adminLoginForm" class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md hidden text-center">
        <h2 class="text-2xl font-bold mb-6">অ্যাডমিন পিন দিন</h2>
        <input type="password" id="adminPin" onkeyup="if(event.key==='Enter') adminLogin()" class="w-full p-4 border rounded-xl mb-4 text-center text-2xl outline-none">
        <button onclick="adminLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">প্রবেশ</button>
        <button onclick="showLogin('choice')" class="mt-4 text-sm text-slate-500">পিছনে যান</button>
    </div>
    <div id="userLoginForm" class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md hidden text-center">
        <h2 class="text-2xl font-bold mb-6">ভাড়াটিয়া লগইন</h2>
        <input type="text" id="userPhone" placeholder="মোবাইল নম্বর" class="w-full p-4 border rounded-xl mb-4 outline-none">
        <input type="password" id="userPass" onkeyup="if(event.key==='Enter') userLogin()" placeholder="পাসওয়ার্ড" class="w-full p-4 border rounded-xl mb-4 outline-none">
        <button onclick="userLogin()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold">লগইন</button>
        <button onclick="showLogin('choice')" class="mt-4 text-sm text-slate-500">পিছনে যান</button>
    </div>
</div>

<aside class="sidebar h-screen sticky top-0 flex flex-col hidden" id="adminSidebar">
    <div class="p-8 text-center border-b border-slate-700"><h1 class="text-2xl font-bold text-white uppercase">স্বপ্নবিলাস</h1></div>
    <nav class="flex-1 mt-6 px-4 space-y-2">
        <button onclick="switchTab('dash')" id="tab-dash" class="nav-btn active w-full flex items-center p-3 rounded-lg"><i class="fas fa-th-large mr-3"></i> ড্যাশবোর্ড</button>
        <button onclick="switchTab('entry')" id="tab-entry" class="nav-btn w-full flex items-center p-3 rounded-lg"><i class="fas fa-user-plus mr-3"></i> ভাড়াটিয়া এন্ট্রি</button>
        <button onclick="switchTab('invoice')" id="tab-invoice" class="nav-btn w-full flex items-center p-3 rounded-lg"><i class="fas fa-file-invoice-dollar mr-3"></i> ইনভয়েস তৈরি</button>
        <button onclick="switchTab('loan')" id="tab-loan" class="nav-btn w-full flex items-center p-3 rounded-lg"><i class="fas fa-hand-holding-usd mr-3"></i> লোন ট্র্যাকিং</button>
        <button onclick="switchTab('report')" id="tab-report" class="nav-btn w-full flex items-center p-3 rounded-lg"><i class="fas fa-chart-line mr-3"></i> রিপোর্ট</button>
    </nav>
    <div class="p-6 border-t border-slate-700"><button onclick="location.reload()" class="w-full text-red-400 p-3"><i class="fas fa-sign-out-alt"></i> লগআউট</button></div>
</aside>

<main class="flex-1 p-10 hidden" id="mainContent">
    <section id="dashSec" class="page-content">
        <div class="flex justify-between items-end mb-8">
            <h2 class="text-3xl font-bold text-slate-800">ড্যাশবোর্ড ওভারভিউ</h2>
            <div id="dashCounter" class="flex gap-4"></div>
        </div>
        <div id="flatGrid" class="grid grid-cols-1 md:grid-cols-4 gap-6"></div>
    </section>

    <section id="entrySec" class="page-content hidden">
        <div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
            <div class="flex justify-between mb-6">
                <h2 id="formTitle" class="text-2xl font-bold">ভাড়াটিয়া ম্যানেজমেন্ট</h2>
                <button onclick="resetTenantForm()" class="text-blue-500 text-sm">নতুন যোগ করুন</button>
            </div>
            <form id="tenantForm" onsubmit="saveTenant(event)" class="grid grid-cols-2 gap-4">
                <input type="hidden" id="tId">
                <input type="text" id="tName" placeholder="নাম" required class="p-3 border rounded-xl">
                <select id="tFlat" onchange="handleFlatSelection(this.value)" class="p-3 border rounded-xl">
                    <option value="">ফ্ল্যাট সিলেক্ট করুন</option>
                    <option>A-1</option><option>A-2</option><option>A-3</option><option>A-4</option>
                    <option>B-1</option><option>B-2</option><option>B-3</option><option>B-4</option>
                    <option>C-1</option><option>C-2</option><option>C-3</option><option>D-1</option><option>D-2</option><option>G-1</option>
                </select>
                <input type="text" id="tPhone" placeholder="মোবাইল নম্বর" required class="p-3 border rounded-xl">
                <input type="password" id="tPass" placeholder="পাসওয়ার্ড" required class="p-3 border rounded-xl">
                <div class="flex flex-col"><label class="text-xs ml-2">যোগদানের তারিখ</label><input type="date" id="tJoin" class="p-3 border rounded-xl"></div>
                <div class="flex flex-col"><label class="text-xs ml-2">ছেড়ে দেওয়ার তারিখ</label><input type="date" id="tExit" onchange="autoInactive(this)" class="p-3 border rounded-xl"></div>
                <select id="tStatus" class="col-span-2 p-3 border rounded-xl bg-slate-50"><option value="Active">এক্টিভ</option><option value="Inactive">ইনএক্টিভ</option></select>
                
                <div id="formFlatStatus" class="col-span-2 hidden bg-blue-50 p-4 rounded-xl border border-blue-100 text-sm"></div>

                <button type="submit" id="saveBtn" class="col-span-2 bg-blue-600 text-white py-4 rounded-xl font-bold">সেভ করুন</button>
            </form>
        </div>
        <div class="max-w-4xl mx-auto mt-8 bg-white p-6 rounded-2xl shadow-sm" id="tenantListContainer">
            <h3 class="font-bold mb-4" id="listHeader">ভাড়াটিয়া তালিকা ও কন্ট্রোল</h3>
            <div id="allTenantList" class="space-y-2 text-center text-slate-400 py-10">ফ্ল্যাট সিলেক্ট করলে তালিকা দেখা যাবে</div>
        </div>
    </section>

    <section id="invoiceSec" class="page-content hidden">
        <div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
            <h2 class="text-2xl font-bold mb-6">ইনভয়েস তৈরি</h2>
            <form onsubmit="saveInvoice(event)" class="space-y-4">
                <select id="invTenant" required class="w-full p-3 border rounded-xl"></select>
                <div class="grid grid-cols-2 gap-4">
                    <select id="invMonth" class="p-3 border rounded-xl outline-none">
                        <option>জানুয়ারি</option><option>ফেব্রুয়ারি</option><option>মার্চ</option><option>এপ্রিল</option><option>মে</option><option>জুন</option><option>জুলাই</option><option>আগস্ট</option><option>সেপ্টেম্বর</option><option>অক্টোবর</option><option>নভেম্বর</option><option>ডিসেম্বর</option>
                    </select>
                    <select id="invYear" class="p-3 border rounded-xl">
                        <option>২০২৪</option><option>২০২৫</option><option selected>২০২৬</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="invRent" placeholder="বাসা ভাড়া" class="p-3 border rounded-xl" required>
                    <input type="number" id="invElec" placeholder="বিদ্যুৎ বিল" class="p-3 border rounded-xl">
                    <input type="number" id="invWater" placeholder="পানির বিল" class="p-3 border rounded-xl">
                    <input type="number" id="invService" placeholder="সার্ভিস চার্জ" class="p-3 border rounded-xl">
                    <input type="number" id="invDue" placeholder="বকেয়া" class="p-3 border rounded-xl">
                    <input type="number" id="invAdv" placeholder="এডভান্স কর্তন" class="p-3 border rounded-xl">
                </div>
                <button type="submit" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold">সেভ ও হোয়াটসঅ্যাপ</button>
            </form>
        </div>
    </section>

    <section id="loanSec" class="page-content hidden">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-8 rounded-2xl shadow-lg border">
                <h2 class="text-xl font-bold mb-6">নতুন লোন এন্ট্রি</h2>
                <input type="text" id="lPerson" placeholder="ব্যক্তির নাম" class="w-full p-3 border mb-3 rounded-xl">
                <input type="number" id="lAmount" placeholder="টাকার পরিমাণ" class="w-full p-3 border mb-3 rounded-xl">
                <textarea id="lReason" placeholder="লোন দেওয়ার কারণ..." class="w-full p-3 border mb-3 rounded-xl h-24"></textarea>
                <input type="date" id="lDate" class="w-full p-3 border mb-6 rounded-xl">
                <button onclick="saveLoan()" class="w-full bg-orange-600 text-white py-4 rounded-xl font-bold">লোন সেভ করুন</button>
            </div>
            <div id="loanList" class="space-y-4"></div>
        </div>
    </section>

    <section id="reportSec" class="page-content hidden">
        <div id="headSummary" class="grid grid-cols-2 md:grid-cols-6 gap-4 mb-8 text-sm"></div>
        <div class="bg-white p-6 rounded-2xl shadow-sm overflow-x-auto" id="reportContent"></div>
    </section>
</main>

<div id="userView" class="hidden min-h-screen p-6 w-full max-w-3xl mx-auto">
    <div class="flex justify-between items-center mb-8 bg-white p-5 rounded-2xl shadow-sm border">
        <div><h2 class="text-2xl font-bold text-slate-800" id="welcomeUser">স্বাগতম</h2></div>
        <button onclick="location.reload()" class="bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-bold">লগআউট</button>
    </div>
    <div id="userInvoiceList" class="space-y-4"></div>
</div>

<div id="historyModal" class="fixed inset-0 bg-black bg-opacity-50 z-[200] hidden flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-lg rounded-2xl p-6">
        <div class="flex justify-between items-center border-b pb-3 mb-4">
            <h3 class="text-xl font-bold" id="histTitle">ফ্ল্যাট হিস্ট্রি</h3>
            <button onclick="closeModal()" class="text-2xl">&times;</button>
        </div>
        <input type="text" id="histFilter" oninput="filterHistory()" placeholder="নাম বা তারিখ দিয়ে খুজুন..." class="w-full p-2 border rounded-lg mb-4 text-sm outline-none focus:border-blue-500">
        <div id="histContent" class="space-y-3 max-h-[60vh] overflow-y-auto"></div>
    </div>
</div>

<div id="invoicePDF" class="hidden"></div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyXd5gwzk3kgzVKcNPEE9-emvSbuTrgnD1dTjsjOYdvI0XypKcoijY1RGd7_ShR89ANjw/exec";
    const _0x4a2b = "U2hvcG5vQDIwMjRA"; 
    const BKASH_NO = "01711235481";
    
    let allTenants = [], allInvoices = [];
    const FLATS_LIST = ["A-1", "A-2", "A-3", "A-4", "B-1", "B-2", "B-3", "B-4", "C-1", "C-2", "C-3", "D-1", "D-2", "G-1"];

    function toBanglaWord(n) {
        const bnNumbers = ['০', '১', '২', '৩', '৪', '৫', '৬', '৭', '৮', '৯'];
        return String(n).replace(/\d/g, d => bnNumbers[d]);
    }

    function formatDate(dateStr) {
        if(!dateStr || dateStr === "") return "-";
        try {
            const d = new Date(dateStr);
            if(isNaN(d)) return dateStr;
            return d.toLocaleDateString('bn-BD');
        } catch(e) { return dateStr; }
    }

    function showLogin(type) {
        document.getElementById('choiceBox').classList.add('hidden');
        document.getElementById('adminLoginForm').classList.add('hidden');
        document.getElementById('userLoginForm').classList.add('hidden');
        if(type === 'admin') {
            document.getElementById('adminLoginForm').classList.remove('hidden');
            document.getElementById('adminPin').focus();
        }
        else if(type === 'user') {
            document.getElementById('userLoginForm').classList.remove('hidden');
            document.getElementById('userPhone').focus();
        }
        else document.getElementById('choiceBox').classList.remove('hidden');
    }

    async function adminLogin() {
        const inputPin = document.getElementById('adminPin').value;
        if(btoa(inputPin) === _0x4a2b) {
            document.getElementById('authOverlay').classList.add('hidden');
            document.getElementById('adminSidebar').classList.remove('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            await fetchData();
        } else {
            alert("ভুল পিন! সঠিক পিন ব্যবহার করুন।");
        }
    }

    async function userLogin() {
        const ph = document.getElementById('userPhone').value;
        const ps = document.getElementById('userPass').value;
        await fetchData();
        const user = allTenants.find(t => t[3] == ph && t[4] == ps);
        if(user) {
            document.getElementById('authOverlay').classList.add('hidden');
            document.getElementById('userView').classList.remove('hidden');
            document.getElementById('welcomeUser').innerText = "স্বাগতম, " + user[1];
            renderUserInvoices(user);
        } else alert("ভুল তথ্য!");
    }

    async function fetchData() {
        const [resT, resI] = await Promise.all([
            fetch(SCRIPT_URL + "?action=getTenants"),
            fetch(SCRIPT_URL + "?action=getInvoices")
        ]);
        allTenants = await resT.json();
        allInvoices = await resI.json();
        renderDashboard();
        renderInvoiceSelect();
        renderReportTable();
        renderLoans();
    }

    function handleFlatSelection(flat) {
        showFlatStatusInForm(flat);
        renderTenantsByFlat(flat);
    }

    function renderTenantsByFlat(flat) {
        const listDiv = document.getElementById('allTenantList');
        const header = document.getElementById('listHeader');
        
        if(!flat) {
            listDiv.innerHTML = 'ফ্ল্যাট সিলেক্ট করলে তালিকা দেখা যাবে';
            listDiv.className = "space-y-2 text-center text-slate-400 py-10";
            header.innerText = "ভাড়াটিয়া তালিকা ও কন্ট্রোল";
            return;
        }

        const filtered = allTenants.filter(t => t[2] === flat);
        header.innerText = `ফ্ল্যাট ${flat} এর ভাড়াটিয়া তালিকা`;
        
        if(filtered.length === 0) {
            listDiv.innerHTML = 'এই ফ্ল্যাটে কোনো ডাটা নেই';
            listDiv.className = "space-y-2 text-center text-slate-400 py-10";
            return;
        }

        listDiv.className = "space-y-2";
        let html = '';
        filtered.slice(0).reverse().forEach(t => {
            html += `<div class="flex justify-between items-center border-b p-3 hover:bg-gray-50">
                <div>
                    <span class="font-bold ${t[7]==='Active'?'text-green-600':'text-slate-500'}">${t[1]}</span> 
                    <span class="text-[10px] ml-2 px-2 py-0.5 rounded ${t[7]==='Active'?'bg-green-100 text-green-700':'bg-slate-100 text-slate-500'}">${t[7]}</span>
                    <p class="text-xs text-slate-400">${t[3]} | জয়েন: ${formatDate(t[5])}</p>
                </div>
                <div class="flex gap-4">
                    <button onclick="editTenant('${t[0]}')" class="text-blue-500 text-sm" title="এডিট"><i class="fas fa-edit"></i></button>
                    <button onclick="deleteTenant('${t[0]}')" class="text-red-500 text-sm" title="ডিলিট"><i class="fas fa-trash-alt"></i></button>
                </div>
            </div>`;
        });
        listDiv.innerHTML = html;
    }

    async function deleteTenant(id) {
        if(confirm("আপনি কি নিশ্চিতভাবে এই ভাড়াটিয়াকে ডিলিট করতে চান? একবার ডিলিট করলে আর ফিরে পাওয়া যাবে না।")) {
            const res = await fetch(SCRIPT_URL, { 
                method: "POST", 
                mode: "no-cors",
                body: JSON.stringify({action: "deleteTenant", id: id}) 
            });
            alert("ডিলিট রিকোয়েস্ট পাঠানো হয়েছে! পেজটি রিফ্রেশ হচ্ছে।");
            fetchData();
        }
    }

    function editTenant(id) {
        const t = allTenants.find(x => x[0] == id);
        if(!t) return;
        document.getElementById('tId').value = t[0];
        document.getElementById('tName').value = t[1];
        document.getElementById('tFlat').value = t[2];
        document.getElementById('tPhone').value = t[3];
        document.getElementById('tPass').value = t[4];
        document.getElementById('tJoin').value = t[5] ? t[5].split('T')[0] : "";
        document.getElementById('tExit').value = t[6] ? t[6].split('T')[0] : "";
        document.getElementById('tStatus').value = t[7];
        document.getElementById('formTitle').innerText = "তথ্য এডিট করুন";
        document.getElementById('saveBtn').innerText = "আপডেট করুন";
        handleFlatSelection(t[2]);
        switchTab('entry');
    }

    function showFlatStatusInForm(flat) {
        if(!flat) {
            document.getElementById('formFlatStatus').classList.add('hidden');
            return;
        }
        const hist = allTenants.filter(t => t[2] === flat);
        const current = hist.find(t => t[7] === 'Active');
        
        let html = `<b>ফ্ল্যাট ${flat} এর অবস্থা:</b><br>`;
        if(current) {
            html += `<span class="text-red-600">বর্তমানে ভাড়া আছেন: ${current[1]} (${current[3]})</span><br>`;
        } else {
            html += `<span class="text-green-600">বর্তমানে ফ্ল্যাটটি খালি আছে।</span><br>`;
        }
        
        if(hist.length > 0) {
            html += `<span class="text-slate-500">মোট রেকর্ড: ${hist.length} টি</span>`;
        }
        
        document.getElementById('formFlatStatus').innerHTML = html;
        document.getElementById('formFlatStatus').classList.remove('hidden');
    }

    function resetTenantForm() {
        document.getElementById('tenantForm').reset();
        document.getElementById('tId').value = "";
        document.getElementById('formTitle').innerText = "নতুন ভাড়াটিয়া তথ্য";
        document.getElementById('saveBtn').innerText = "সেভ করুন";
        document.getElementById('formFlatStatus').classList.add('hidden');
        document.getElementById('allTenantList').innerHTML = 'ফ্ল্যাট সিলেক্ট করলে তালিকা দেখা যাবে';
        document.getElementById('listHeader').innerText = "ভাড়াটিয়া তালিকা ও কন্ট্রোল";
    }

    function showFlatHistory(flat) {
        const hist = allTenants.filter(t => t[2] === flat);
        document.getElementById('histTitle').innerText = `ফ্ল্যাট ${flat} এর ইতিহাস`;
        document.getElementById('histFilter').value = "";
        renderHistoryList(hist);
        document.getElementById('historyModal').classList.remove('hidden');
    }

    function renderHistoryList(data) {
        let html = '';
        [...data].reverse().forEach(t => {
            html += `<div class="bg-slate-50 p-3 rounded-lg border hist-item">
                <p class="font-bold text-slate-700">${t[1]}</p>
                <div class="flex justify-between text-xs text-slate-500 mt-1">
                    <span>যোগদান: ${formatDate(t[5])}</span>
                    <span>বিদায়: ${formatDate(t[6])}</span>
                </div>
                <p class="text-xs mt-1">অবস্থা: <span class="${t[7]=='Active'?'text-green-600':'text-red-500'} font-bold">${t[7]}</span></p>
            </div>`;
        });
        document.getElementById('histContent').innerHTML = html || "কোন ইতিহাস পাওয়া যায়নি।";
    }

    function filterHistory() {
        const val = document.getElementById('histFilter').value.toLowerCase();
        document.querySelectorAll('.hist-item').forEach(item => {
            const text = item.innerText.toLowerCase();
            item.style.display = text.includes(val) ? "block" : "none";
        });
    }

    function closeModal() { document.getElementById('historyModal').classList.add('hidden'); }

    function renderUserInvoices(user) {
        let html = '';
        const userInvs = allInvoices.filter(inv => inv[1] == user[0]).reverse();
        userInvs.forEach(inv => {
            html += `<div onclick='showInvoicePDF(${JSON.stringify(inv)}, ${JSON.stringify(user)})' class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-blue-500 cursor-pointer hover:bg-slate-50 transition">
                <div class="flex justify-between items-center">
                    <div><b class="text-xl">${inv[2]} ${inv[3]}</b><p class="text-xs text-slate-400 mt-1">ক্লিক করে ইনভয়েস ডাউনলোড করুন</p></div>
                    <div class="text-blue-600 font-bold text-2xl">${toBanglaWord(inv[10])}/-</div>
                </div>
            </div>`;
        });
        document.getElementById('userInvoiceList').innerHTML = html || "<p class='text-center'>কোনো ইনভয়েস নেই।</p>";
    }

    function showInvoicePDF(inv, user) {
        const pdfContainer = document.getElementById('invoicePDF');
        pdfContainer.classList.remove('hidden');
        pdfContainer.innerHTML = `
            <div class="invoice-box" id="printArea">
                <div class="flex justify-between border-b-2 border-slate-800 pb-5 mb-5">
                    <div><h1 class="text-3xl font-bold text-blue-600">স্বপ্নবিলাস</h1><p>বাসা ভাড়া ইনভয়েস</p></div>
                    <div class="text-right"><p>তারিখ: ${formatDate(new Date())}</p><p>মাস: ${inv[2]} ${inv[3]}</p></div>
                </div>
                <div class="mb-8">
                    <h3 class="font-bold border-b w-max mb-2">ভাড়াটিয়ার তথ্য:</h3>
                    <p>নাম: <b>${user[1]}</b></p><p>ফ্ল্যাট: <b>${user[2]}</b></p><p>মোবাইল: ${user[3]}</p>
                </div>
                <table class="w-full text-left border-collapse mb-8">
                    <tr class="bg-slate-100"><th class="p-2 border">বিবরণ</th><th class="p-2 border text-right">টাকা (বাংলায়)</th></tr>
                    <tr><td class="p-2 border">বাসা ভাড়া</td><td class="p-2 border text-right">${toBanglaWord(inv[4])}/-</td></tr>
                    <tr><td class="p-2 border">বিদ্যুৎ বিল</td><td class="p-2 border text-right">${toBanglaWord(inv[5])}/-</td></tr>
                    <tr><td class="p-2 border">পানির বিল</td><td class="p-2 border text-right">${toBanglaWord(inv[6])}/-</td></tr>
                    <tr><td class="p-2 border">সার্ভিস চার্জ</td><td class="p-2 border text-right">${toBanglaWord(inv[7])}/-</td></tr>
                    <tr><td class="p-2 border">বকেয়া (যদি থাকে)</td><td class="p-2 border text-right">${toBanglaWord(inv[9])}/-</td></tr>
                    <tr class="font-bold bg-blue-50"><td class="p-2 border">সর্বমোট বিল</td><td class="p-2 border text-right text-blue-600">${toBanglaWord(inv[10])}/-</td></tr>
                </table>
                <div class="bg-yellow-50 p-4 rounded-xl border border-yellow-200">
                    <p class="font-bold text-slate-800">পেমেন্ট মেথড:</p>
                    <p>বিকাশ (পার্সোনাল): <b>${toBanglaWord(BKASH_NO)}</b></p>
                    <p class="text-xs text-red-600 mt-1">* পেমেন্ট করে অবশ্যই কনফার্ম করবেন।</p>
                </div>
                <button id="dlBtn" onclick="downloadPDF()" class="mt-5 bg-blue-600 text-white px-8 py-3 rounded-xl font-bold no-print w-full">Download PDF</button>
            </div>
        `;
        window.scrollTo(0, document.body.scrollHeight);
    }

    function downloadPDF() {
        const element = document.getElementById('printArea');
        const dlBtn = document.getElementById('dlBtn');
        dlBtn.style.display = 'none';
        const opt = { margin: 0.5, filename: 'Invoice.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' } };
        html2pdf().set(opt).from(element).save().then(() => {
            alert("ডাউনলোড সম্পন্ন!");
            dlBtn.style.display = 'block';
        });
    }

    async function saveLoan() {
        const payload = {
            action: "saveLoan", person: document.getElementById('lPerson').value, 
            amount: document.getElementById('lAmount').value, 
            reason: document.getElementById('lReason').value,
            date: document.getElementById('lDate').value
        };
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
        alert("লোন সেভ হয়েছে!"); fetchData();
    }

    async function renderLoans() {
        const res = await fetch(SCRIPT_URL + "?action=getLoans");
        const loans = await res.json();
        let html = '';
        loans.slice(1).reverse().forEach(l => {
            html += `<div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 ${l[5]==='Pending'?'border-orange-500':'border-green-500'}">
                <div class="flex justify-between">
                    <div><b>${l[1]}</b> <span class="text-slate-400 text-xs ml-2">${formatDate(l[4])}</span></div>
                    <div class="font-bold text-orange-600">${toBanglaWord(l[2])}/-</div>
                </div>
                <p class="text-xs text-slate-500 mt-2 italic">কারণ: ${l[3] || 'উল্লেখ নেই'}</p>
                <div class="mt-4 flex justify-end">
                    ${l[5]==='Pending'? `<button onclick="returnLoan('${l[0]}')" class="bg-blue-600 text-white px-3 py-1 rounded text-xs font-bold">ফেরত এন্ট্রি করুন</button>` : `<span class="text-green-600 text-xs font-bold">পরিশোধিত (${formatDate(l[6])})</span>`}
                </div>
            </div>`;
        });
        document.getElementById('loanList').innerHTML = html;
    }

    async function returnLoan(id) {
        const rDate = prompt("ফেরত প্রদানের তারিখ দিন (YYYY-MM-DD):", new Date().toISOString().split('T')[0]);
        if(rDate) {
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({action: "returnLoan", id, rDate}) });
            fetchData();
        }
    }

    function renderDashboard() {
        let html = '';
        let activeCount = 0;
        FLATS_LIST.forEach(f => {
            const t = allTenants.find(t => t[2] == f && t[7] == 'Active');
            if(t) activeCount++;
            html += `<div class="bg-white p-5 rounded-2xl shadow-sm border-t-4 ${t?'border-green-500':'border-slate-200'}">
                <div class="flex justify-between">
                    <h4 class="font-bold text-lg">${f}</h4>
                    <button onclick="showFlatHistory('${f}')" class="text-xs text-blue-400"><i class="fas fa-history"></i></button>
                </div>
                <p class="text-slate-400 text-xs mt-1">${t ? t[1] : 'ফাঁকা'}</p>
            </div>`;
        });
        document.getElementById('flatGrid').innerHTML = html;
        
        document.getElementById('dashCounter').innerHTML = `
            <div class="bg-blue-100 text-blue-700 px-4 py-2 rounded-xl text-xs font-bold">মোট: ${toBanglaWord(FLATS_LIST.length)}</div>
            <div class="bg-green-100 text-green-700 px-4 py-2 rounded-xl text-xs font-bold">ভাড়া: ${toBanglaWord(activeCount)}</div>
            <div class="bg-slate-100 text-slate-700 px-4 py-2 rounded-xl text-xs font-bold">খালি: ${toBanglaWord(FLATS_LIST.length - activeCount)}</div>
        `;
    }

    async function saveInvoice(e) {
        e.preventDefault();
        const t = document.getElementById('invTenant').value.split('|');
        const month = document.getElementById('invMonth').value;
        const rent = Number(document.getElementById('invRent').value), elec = Number(document.getElementById('invElec').value) || 0,
              water = Number(document.getElementById('invWater').value) || 0, service = Number(document.getElementById('invService').value) || 0,
              due = Number(document.getElementById('invDue').value) || 0, adv = Number(document.getElementById('invAdv').value) || 0;
        const total = (rent + elec + water + service + due) - adv;
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({
            action: "saveInvoice", tId: t[0], month, year: document.getElementById('invYear').value,
            rent, elec, water, service, adv, due, total
        })});
        const msg = `আসসালামু আলাইকুম প্রিয় ${t[2]},\nআপনার গত ${month} মাসের ইনভয়েস তৈরি হয়েছে।\nমোট বিল: ${total}/-\nবিকাশ পেমেন্ট: ${BKASH_NO}\nঅনুগ্রহ করে চলতি মাসের ১০ তারিখের মধ্যে পরিশোধ করুন।`;
        window.open(`https://wa.me/${t[1]}?text=${encodeURIComponent(msg)}`);
        fetchData(); switchTab('report');
    }

    function renderReportTable() {
        let html = `<table class="w-full text-left border-collapse"><thead class="sticky top-0"><tr class="bg-slate-800 text-white text-[10px]">
            <th class="p-2 border">নাম/ফ্ল্যাট</th><th class="p-2 border">মাস</th><th class="p-2 border text-right">ভাড়া</th>
            <th class="p-2 border text-right">বিদ্যুৎ</th><th class="p-2 border text-right">পানি</th><th class="p-2 border text-right">সার্ভিস</th>
            <th class="p-2 border text-right">বকেয়া</th><th class="p-2 border text-right font-bold">মোট</th></tr></thead><tbody>`;
        let sums = { rent:0, elec:0, water:0, service:0, due:0, total:0 };
        allInvoices.slice(1).reverse().forEach(inv => {
            const t = allTenants.find(t => t[0] == inv[1]);
            sums.rent += Number(inv[4]); sums.elec += Number(inv[5]); sums.water += Number(inv[6]); 
            sums.service += Number(inv[7]); sums.due += Number(inv[9]); sums.total += Number(inv[10]);
            html += `<tr class="border-b text-[11px] hover:bg-slate-50">
                <td class="p-2 border font-bold">${t?t[1]+'<br>('+t[2]+')':'N/A'}</td>
                <td class="p-2 border">${inv[2]}</td>
                <td class="p-2 border text-right">${toBanglaWord(inv[4])}</td>
                <td class="p-2 border text-right">${toBanglaWord(inv[5])}</td>
                <td class="p-2 border text-right">${toBanglaWord(inv[6])}</td>
                <td class="p-2 border text-right">${toBanglaWord(inv[7])}</td>
                <td class="p-2 border text-right">${toBanglaWord(inv[9])}</td>
                <td class="p-2 border text-right font-bold text-blue-600">${toBanglaWord(inv[10])}</td>
            </tr>`;
        });
        document.getElementById('reportContent').innerHTML = html + "</tbody></table>";
        document.getElementById('headSummary').innerHTML = `
            <div class="bg-white p-4 rounded shadow border-l-4 border-blue-500">ভাড়া:<br><b class="text-lg">${toBanglaWord(sums.rent)}</b></div>
            <div class="bg-white p-4 rounded shadow border-l-4 border-yellow-500">বিদ্যুৎ:<br><b class="text-lg">${toBanglaWord(sums.elec)}</b></div>
            <div class="bg-white p-4 rounded shadow border-l-4 border-cyan-500">পানি:<br><b class="text-lg">${toBanglaWord(sums.water)}</b></div>
            <div class="bg-white p-4 rounded shadow border-l-4 border-indigo-500">সার্ভিস:<br><b class="text-lg">${toBanglaWord(sums.service)}</b></div>
            <div class="bg-white p-4 rounded shadow border-l-4 border-red-500 text-red-600">বকেয়া:<br><b class="text-lg">${toBanglaWord(sums.due)}</b></div>
            <div class="bg-white p-4 rounded shadow border-l-4 border-green-500 text-green-600 font-bold">মোট:<br><b class="text-lg">${toBanglaWord(sums.total)}</b></div>`;
    }

    function renderInvoiceSelect() {
        let opt = '<option value="">নির্বাচন করুন</option>';
        allTenants.forEach(t => { if(t[7] === 'Active') opt += `<option value="${t[0]}|${t[3]}|${t[1]}">${t[1]} (${t[2]})</option>`; });
        document.getElementById('invTenant').innerHTML = opt;
    }

    function switchTab(tab) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab + 'Sec').classList.remove('hidden');
        document.getElementById('tab-' + tab).classList.add('active');
        document.getElementById('invoicePDF').classList.add('hidden');
        if(tab !== 'entry') resetTenantForm();
    }

    async function saveTenant(e) {
        e.preventDefault();
        const data = {
            action: "saveTenant", id: document.getElementById('tId').value || "T-" + Date.now(),
            name: document.getElementById('tName').value, flat: document.getElementById('tFlat').value,
            phone: document.getElementById('tPhone').value, pass: document.getElementById('tPass').value,
            join: document.getElementById('tJoin').value, exit: document.getElementById('tExit').value, status: document.getElementById('tStatus').value
        };
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(data) });
        alert("তথ্য সংরক্ষিত!"); fetchData(); switchTab('dash');
    }

    function autoInactive(el) { if(el.value) document.getElementById('tStatus').value = "Inactive"; }
</script>
