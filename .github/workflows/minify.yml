name: Minify HTML
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  minify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Minify HTML files
        run: |
          npx html-minifier-terser --collapse-whitespace --remove-comments --minify-js true --minify-css true --input-dir . --output-dir . --file-ext html

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated HTML Minification" || exit 0
          git push
